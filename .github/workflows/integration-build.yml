name: "Integration Build"

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags: [ v* ]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  JDK_RELEASE: 17
  JDK_CURRENT: 25
  SBT_OPTS: >- # Use all available resources
    -Xmx10G
    -Xms6G
    -Xss4M
    -XX:ReservedCodeCacheSize=512M

jobs:
  test_jvm:
    name: "[JDK ${{ matrix.java }}] Execute Tests"
    strategy:
      fail-fast: false
      matrix:
        java: [ 17, 25 ]
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:${{ matrix.java }}
    timeout-minutes: 30
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Execute Unit Tests
        run: sbt --no-colors --supershell=false "version-jvm/test"

      - name: Package Project Products
        run: sbt --no-colors --supershell=false "version-jvm/package"

  test_native:
    name: "[Native: ${{ matrix.target }}] Execute Tests"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-musl-x86_64
            runner: ubuntu-24.04
            container: shuwariafrica/alpine-jdk:25
          - target: windows-x86_64
            runner: windows-2025
          - target: macos-aarch64
            runner: macos-26
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: 30
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java (non-container hosts)
        if: matrix.container == ''
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_CURRENT }}
          check-latest: true

      - name: Set up sbt (non-container hosts)
        if: matrix.container == ''
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Resolve libgit2 SHA
        id: libgit2
        shell: bash
        run: echo "sha=$(git -C vendor/libgit2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache vendored libgit2 build
        uses: actions/cache@v5
        with:
          path: vendor/libgit2/build
          key: libgit2-${{ matrix.target }}-${{ steps.libgit2.outputs.sha }}

      - name: Install LLVM toolchain (macOS)
        if: startsWith(matrix.target, 'macos-')
        shell: bash
        run: |
          brew update
          brew install llvm bdw-gc cmake || true
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM toolchain (Windows)
        if: startsWith(matrix.target, 'windows-')
        shell: pwsh
        run: |
          choco install -y llvm
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Execute Unit Tests
        shell: bash
        run: sbt --no-colors --supershell=false "version-native/test"

      - name: Package Project Products
        shell: bash
        run: sbt --no-colors --supershell=false "version-native/package"

  test_sbt_scripted:
    name: Execute sbt Scripted Tests
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:25
    timeout-minutes: 30
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Execute sbt Scripted Tests
        run: sbt --no-colors --supershell=false "sbt-version/scripted"

  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:25
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Verify Source Formatting
        id: scalafmt
        continue-on-error: true
        run: sbt --no-colors --supershell=false scalafmtCheckAll

      - name: Verify Linting Conformity
        id: scalafix
        continue-on-error: true
        run: sbt --no-colors --supershell=false "scalafixAll --check"

      - name: Verify File Header Conformity
        id: headers
        continue-on-error: true
        run: sbt --no-colors --supershell=false headerCheckAll

      - name: Check for failures
        if: always()
        run: |
          failed=""
          [[ "${{ steps.scalafmt.outcome }}" == "failure" ]] && failed="$failed scalafmtCheckAll"
          [[ "${{ steps.scalafix.outcome }}" == "failure" ]] && failed="$failed scalafixAll"
          [[ "${{ steps.headers.outcome }}" == "failure" ]] && failed="$failed headerCheckAll"
          if [[ -n "$failed" ]]; then
            echo "::error::Static analysis checks failed:$failed"
            exit 1
          fi

  docs:
    name: Build Documentation Site
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:25
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Build Documentation Site
        id: build-site
        run: |
          sbt -Dsbt.ci=true docs/generateUnidoc
          site_dir="$(pwd)/target/site"
          test -s "$site_dir/index.html" \
            || { echo "::error::Documentation site build produced no index.html"; exit 1; }
          touch "$site_dir/.nojekyll"
          echo "site_dir=$site_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Pages Artefact
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.build-site.outputs.site_dir }}

  snapshot:
    name: Publish Snapshot
    needs:
      - test_jvm
      - test_native
      - test_sbt_scripted
      - static_analysis
      - docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:17
    timeout-minutes: 90
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Resolve libgit2 SHA
        id: libgit2
        shell: bash
        run: echo "sha=$(git -C vendor/libgit2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache vendored libgit2 build
        uses: actions/cache@v5
        with:
          path: vendor/libgit2/build
          key: libgit2-${{ runner.os }}-${{ runner.arch }}-${{ steps.libgit2.outputs.sha }}

      - name: Import Signing Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.OSS_PUBLISH_USER_SIGNING_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          trust_level: 5
#
#      - name: Publish Snapshot
#        run: sbt --no-colors --supershell=false aetherDeploy
#        env:
#          SONATYPE_USERNAME: ${{ secrets.OSS_PUBLISH_USER }}
#          SONATYPE_PASSWORD: ${{ secrets.OSS_PUBLISH_USER_PASSPHRASE }}
#          SIGNING_KEY_ID: ${{ secrets.OSS_PUBLISH_USER_SIGNING_KEY_ID }}

  publish:
    name: Publish Release
    needs:
      - test_jvm
      - test_native
      - test_sbt_scripted
      - static_analysis
      - docs
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:17
    timeout-minutes: 90
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Coursier cache
        uses: coursier/cache-action@v7

      - name: Resolve libgit2 SHA
        id: libgit2
        shell: bash
        run: echo "sha=$(git -C vendor/libgit2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache vendored libgit2 build
        uses: actions/cache@v5
        with:
          path: vendor/libgit2/build
          key: libgit2-${{ runner.os }}-${{ runner.arch }}-${{ steps.libgit2.outputs.sha }}

      - name: Import Signing Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.OSS_PUBLISH_USER_SIGNING_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          trust_level: 5

      - name: Publish Projects
        run: sbt --no-colors --supershell=false publishSigned sonaUpload sonaRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.OSS_PUBLISH_USER }}
          SONATYPE_PASSWORD: ${{ secrets.OSS_PUBLISH_USER_PASSPHRASE }}
          SIGNING_KEY_ID: ${{ secrets.OSS_PUBLISH_USER_SIGNING_KEY_ID }}

  release_binaries:
    name: Build Release Binary (${{ matrix.target }})
    needs: [ publish ]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            container: shuwariafrica/alpine-jdk:17
            static: true
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            container: shuwariafrica/alpine-jdk:17
            static: true
          - target: macos-x86_64
            runner: macos-13
          - target: macos-aarch64
            runner: macos-14
          - target: windows-x86_64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java (non-container hosts)
        if: matrix.container == ''
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_RELEASE }}
          check-latest: true

      - name: Set up sbt (non-container hosts)
        if: matrix.container == ''
        uses: sbt/setup-sbt@v1

      - name: Install LLVM toolchain (macOS)
        if: startsWith(matrix.target, 'macos-')
        shell: bash
        run: |
          brew update
          brew install llvm bdw-gc cmake || true
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM toolchain (Windows)
        if: startsWith(matrix.target, 'windows-')
        shell: pwsh
        run: |
          choco install -y llvm
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Release Archive
        id: archive
        shell: bash
        env:
          STATIC_FLAG: ${{ matrix.static && '-Drelease.binary.static=true' || '' }}
        run: |
          sbt --no-colors --supershell=false \
            -Dactions.publish.target=${{ matrix.target }} \
            -Drelease.binary=true $STATIC_FLAG \
            "version-cliNative/releaseArchive"

      - name: Verify static linkage
        if: matrix.static
        shell: sh
        run: |
          bin="${{ steps.archive.outputs.binary }}"
          file_out=$(file "$bin")
          echo "$file_out"
          case "$file_out" in
            *"statically linked"*) echo "OK: $bin is statically linked" ;;
            *) echo "::error::$bin is NOT statically linked: $file_out"; exit 1 ;;
          esac

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Create release if it doesn't exist yet (first matrix job wins the race).
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --draft \
              --generate-notes
          gh release upload "${{ github.ref_name }}" "${{ steps.archive.outputs.archive }}" \
            --repo "${{ github.repository }}" --clobber

  site-release:
    name: Publish Site & Finalise Release
    needs: [ docs, publish, release_binaries ]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write          # needed to finalise the release
      pages: write             # deploy to GitHub Pages
      id-token: write          # required by actions/deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    timeout-minutes: 15
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4

      - name: Finalise GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --verify-tag \
            --draft=false \
            $prerelease_flag

  dependency-graph:
    name: Update Dependency Graph
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:25
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Submit Dependency Graph
        uses: scalacenter/sbt-dependency-submission@v3
